name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Show Python version
        run: python --version

      - name: Run Tests
        run: python test_calculator.py

      - name: Show system info on success
        run: |
          echo "Tests completed successfully!"
          echo "Runner info:"
          uname -a